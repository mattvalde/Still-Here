<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Gallery — Still Here</title>
  <link rel="stylesheet" href="styles/styles.css?v=12" />
</head>
<body>

  <main class="main-content gallery-page" id="mainContent">
    <section class="col-panel gallery-shell">
      <div class="col-header gallery-toolbar">
        <span>Image Gallery</span>
        <span class="gallery-status" id="galleryStatus">0 / 0</span>
      </div>
      <div class="gallery-filter" aria-label="Gallery days">
        <button class="gallery-filter__button is-active" type="button" data-gallery-day="1">Day 1</button>
        <button class="gallery-filter__button" type="button" data-gallery-day="2">Day 2</button>
        <button class="gallery-filter__button" type="button" data-gallery-day="3">Day 3</button>
        <button class="gallery-filter__button" type="button" data-gallery-day="4">Day 4</button>
        <button class="gallery-filter__button" type="button" data-gallery-day="5">Day 5</button>
        <button class="gallery-filter__button" type="button" data-gallery-day="6">Day 6</button>
        <button class="gallery-filter__button" type="button" data-gallery-day="7">Day 7</button>
        <button class="gallery-filter__button" type="button" data-gallery-day="8">Day 8</button>
      </div>
      <div class="col-body gallery-scroll">
        <div class="gallery-grid-large" id="galleryGrid"></div>
        <div class="gallery-sentinel" id="gallerySentinel"></div>
        <section class="gallery-reflection" id="galleryReflection" hidden></section>
      </div>
    </section>
  </main>

  <script src="scripts/sidebar.js?v=5"></script>
  <div class="gallery-lightbox" id="galleryLightbox" aria-hidden="true">
    <button class="gallery-lightbox__close" id="galleryLightboxClose" type="button" aria-label="Close">&times;</button>
    <img id="galleryLightboxImage" alt="" />
    <div class="gallery-lightbox__caption" id="galleryLightboxCaption"></div>
  </div>
  <script src="scripts/gallery.js?v=10"></script>
</body>
</html>
